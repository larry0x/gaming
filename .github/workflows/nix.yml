name: Nix

on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes

      # --inputs-from . resolves nixpkgs through flake.lock, so the tools come
      # from the exact same nixpkgs revision the machine builds from.
      - name: statix (anti-pattern lints)
        run: nix run --inputs-from . nixpkgs#statix -- check .

      - name: deadnix (dead code)
        run: nix run --inputs-from . nixpkgs#deadnix -- --fail .

      - name: nixfmt (format check)
        run: nix run --inputs-from . nixpkgs#nixfmt -- --check $(git ls-files '*.nix')

      # The real type check: evaluate the whole NixOS system. Catches options
      # that do not exist (typos) and values of the wrong type.
      - name: eval (NixOS option type check)
        run: nix eval .#nixosConfigurations.gaming.config.system.build.toplevel.drvPath

      # Same for the mac environment. Evaluation is system-agnostic (no import
      # from derivation), so the aarch64-darwin derivation evaluates fine on
      # this Linux runner without building anything.
      - name: eval (mac dev env type check)
        run: nix eval .#packages.aarch64-darwin.default.drvPath
